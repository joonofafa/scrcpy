<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>scrcpy-ai Login</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #1a1a2e;
    color: #eee;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}
.login-box {
    background: #16213e;
    border: 1px solid #0f3460;
    border-radius: 12px;
    padding: 40px;
    width: 340px;
    text-align: center;
}
h1 { font-size: 20px; margin-bottom: 8px; }
.subtitle { color: #888; font-size: 13px; margin-bottom: 24px; }
input[type="text"] {
    width: 100%;
    padding: 14px;
    font-size: 24px;
    text-align: center;
    letter-spacing: 8px;
    background: #0f3460;
    border: 1px solid #1a4a8a;
    border-radius: 8px;
    color: #fff;
    outline: none;
}
input[type="text"]:focus { border-color: #e94560; }
input[type="text"]::placeholder {
    letter-spacing: 2px;
    font-size: 14px;
    color: #666;
}
button {
    width: 100%;
    padding: 12px;
    margin-top: 16px;
    font-size: 15px;
    font-weight: 600;
    background: #e94560;
    color: #fff;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}
button:hover { background: #c73650; }
.error {
    color: #e94560;
    font-size: 13px;
    margin-top: 12px;
    min-height: 20px;
}
.setup-link {
    margin-top: 20px;
    font-size: 12px;
    color: #666;
}
.setup-link a { color: #888; text-decoration: underline; cursor: pointer; }
.qr-container {
    display: none;
    margin-top: 16px;
    padding: 16px;
    background: #fff;
    border-radius: 8px;
}
.qr-container img { width: 200px; height: 200px; }
.qr-secret {
    margin-top: 8px;
    font-size: 11px;
    color: #333;
    word-break: break-all;
}
</style>
</head>
<body>
<div class="login-box">
    <h1>scrcpy-ai</h1>
    <p class="subtitle">Google Authenticator OTP</p>
    <form id="loginForm">
        <input type="text" id="otp" maxlength="6" pattern="[0-9]{6}"
               placeholder="000000" autocomplete="one-time-code" autofocus>
        <button type="submit">Login</button>
    </form>
    <div class="error" id="error"></div>
    <div class="setup-link">
        <a id="showQr">QR 코드 보기 (최초 등록)</a>
    </div>
    <div class="qr-container" id="qrContainer">
        <img id="qrImg" src="" alt="QR Code">
        <div class="qr-secret" id="qrSecret"></div>
    </div>
</div>
<script>
const form = document.getElementById('loginForm');
const otpInput = document.getElementById('otp');
const errorEl = document.getElementById('error');

form.addEventListener('submit', async (e) => {
    e.preventDefault();
    errorEl.textContent = '';
    const code = otpInput.value.trim();
    if (code.length !== 6) { errorEl.textContent = '6자리 코드를 입력하세요'; return; }
    try {
        const r = await fetch('/auth/login', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({code}),
        });
        const data = await r.json();
        if (data.ok) {
            window.location.href = '/';
        } else {
            errorEl.textContent = data.error || '인증 실패';
            otpInput.value = '';
            otpInput.focus();
        }
    } catch (err) {
        errorEl.textContent = '서버 연결 실패';
    }
});

document.getElementById('showQr').addEventListener('click', async () => {
    const container = document.getElementById('qrContainer');
    if (container.style.display === 'block') {
        container.style.display = 'none';
        return;
    }
    try {
        const r = await fetch('/auth/setup');
        const data = await r.json();
        document.getElementById('qrImg').src = 'data:image/png;base64,' + data.qr_base64;
        document.getElementById('qrSecret').textContent = 'Secret: ' + data.secret;
        container.style.display = 'block';
    } catch (err) {
        errorEl.textContent = 'QR 코드 로드 실패';
    }
});

// Auto-submit on 6 digits
otpInput.addEventListener('input', () => {
    if (otpInput.value.length === 6) {
        form.dispatchEvent(new Event('submit'));
    }
});
</script>
</body>
</html>
