<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Remote SCRCPY</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #1a1a2e;
    color: #eee;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}
.login-box {
    background: #16213e;
    border: 1px solid #0f3460;
    border-radius: 12px;
    padding: 40px;
    width: 340px;
    text-align: center;
}
h1 { font-size: 20px; margin-bottom: 8px; }
.subtitle { color: #888; font-size: 13px; margin-bottom: 24px; }
input[type="number"] {
    width: 100%;
    padding: 14px;
    font-size: 24px;
    text-align: center;
    letter-spacing: 8px;
    background: #0f3460;
    border: 1px solid #1a4a8a;
    border-radius: 8px;
    color: #fff;
    outline: none;
    -moz-appearance: textfield;
}
input[type="number"]::-webkit-outer-spin-button,
input[type="number"]::-webkit-inner-spin-button {
    -webkit-appearance: none;
    margin: 0;
}
input[type="number"]:focus { border-color: #e94560; }
input[type="number"]::placeholder {
    letter-spacing: 2px;
    font-size: 14px;
    color: #666;
}
button {
    width: 100%;
    padding: 12px;
    margin-top: 16px;
    font-size: 15px;
    font-weight: 600;
    background: #e94560;
    color: #fff;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}
button:hover { background: #c73650; }
.error {
    color: #e94560;
    font-size: 13px;
    margin-top: 12px;
    min-height: 20px;
}
</style>
</head>
<body>
<div class="login-box">
    <h1>Remote SCRCPY</h1>
    <p class="subtitle">OTP</p>
    <form id="loginForm">
        <input type="number" id="otp" maxlength="6"
               placeholder="000000" autocomplete="one-time-code"
               inputmode="numeric" autofocus>
        <button type="submit">Login</button>
    </form>
    <div class="error" id="error"></div>
</div>
<script>
const form = document.getElementById('loginForm');
const otpInput = document.getElementById('otp');
const errorEl = document.getElementById('error');

// Enforce 6 digit max
otpInput.addEventListener('input', () => {
    if (otpInput.value.length > 6) {
        otpInput.value = otpInput.value.slice(0, 6);
    }
    if (otpInput.value.length === 6) {
        form.dispatchEvent(new Event('submit'));
    }
});

form.addEventListener('submit', async (e) => {
    e.preventDefault();
    errorEl.textContent = '';
    const code = otpInput.value.trim();
    if (code.length !== 6) { errorEl.textContent = '6자리 코드를 입력하세요'; return; }
    try {
        const r = await fetch('/auth/login', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({code}),
        });
        const data = await r.json();
        if (data.ok) {
            window.location.href = '/';
        } else {
            errorEl.textContent = data.error || '인증 실패';
            otpInput.value = '';
            otpInput.focus();
        }
    } catch (err) {
        errorEl.textContent = '서버 연결 실패';
    }
});
</script>
</body>
</html>
